name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true

      - name: Create local.properties
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties

      - name: Get dependencies
        run: flutter pub get

      - name: Patch flutter_blue_plus_android build.gradle
        run: |
          # flutter_blue_plus_android uses flutter.compileSdkVersion which isn't
          # available in plugin sub-projects — replace with hard-coded values.
          FBP=$(find ~/.pub-cache -path "*flutter_blue_plus_android*/android/build.gradle" 2>/dev/null | head -1)
          if [ -n "$FBP" ]; then
            sed -i 's/flutter\.compileSdkVersion/34/g'  "$FBP"
            sed -i 's/flutter\.targetSdkVersion/34/g'   "$FBP"
            sed -i 's/flutter\.minSdkVersion/21/g'      "$FBP"
            echo "Patched $FBP"
            cat "$FBP"
          else
            echo "flutter_blue_plus_android build.gradle not found — skipping patch"
          fi

      - name: Build APK (debug — installable without signing)
        run: flutter build apk --debug --no-tree-shake-icons

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: parcel-scanner-debug
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30
