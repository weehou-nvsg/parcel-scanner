name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true

      - name: Create local.properties
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties

      - name: Get dependencies
        run: flutter pub get

      - name: Patch flutter_blue_plus_android build.gradle
        run: |
          FILE=$(find $HOME/.pub-cache -name "build.gradle" -path "*flutter_blue_plus_android*" | head -1)
          echo "Found: $FILE"
          sed -i 's/flutter\.compileSdkVersion/34/g' "$FILE"

      - name: Build APK (debug — installable without signing)
        run: flutter build apk --debug --no-tree-shake-icons

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: parcel-scanner-debug
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30
