name: parcel_scanner
description: Parcel label scanner, QR generator, and HPRT printer
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_mlkit_text_recognition: ^0.13.0
  camera: ^0.10.5+9
  qr_flutter: ^4.1.0
  flutter_blue_plus: ^1.31.15        # BLE for HPRT HM-T3 Pro
  shared_preferences: ^2.2.2
  permission_handler: ^11.3.0
  path_provider: ^2.1.2
  screenshot: ^2.3.0
  cupertino_icons: ^1.0.2
  google_generative_ai: ^0.4.0
  http: ^1.2.0
  pdf: ^3.10.8
  printing: ^5.12.0
  qr: ^3.0.1
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
